<!-- Mobile overlay backdrop -->
<div class="mobile-overlay" *ngIf="isMobileOpen" (click)="closeMobileMenu()"></div>

<div class="sidebar" [class.collapsed]="isCollapsed" [class.mobile-active]="isMobileOpen">

  <!-- Toggle Button (desktop only) -->
  <button class="collapse-toggle" (click)="toggleCollapse()" [title]="isCollapsed ? 'Expand' : 'Collapse'">
    <ion-icon [name]="isCollapsed ? 'chevron-forward-outline' : 'chevron-back-outline'"></ion-icon>
  </button>

  <!-- Mobile close button -->
  <button class="mobile-close-btn" (click)="closeMobileMenu()">
    <ion-icon name="close-outline"></ion-icon>
  </button>

  <!-- Brand -->
  <div class="sidebar-brand">
    <div class="brand-flower"></div>
    <div class="brand-text" *ngIf="!isCollapsed">
      <h2>Craft by Mika</h2>
      <span>Admin Panel</span>
    </div>
  </div>

  <!-- Nav Links -->
  <nav class="sidebar-nav">
    <a class="nav-item"
       [class.active]="activeRoute === 'dashboard'"
       routerLink="/admin/dashboard"
       (click)="closeMobileMenu()"
       [title]="isCollapsed ? 'Dashboard' : ''">
      <div class="nav-icon">
        <ion-icon name="grid-outline"></ion-icon>
      </div>
      <span class="nav-label" *ngIf="!isCollapsed">Dashboard</span>
      <span class="nav-badge" *ngIf="!isCollapsed && pendingCount > 0">{{ pendingCount }}</span>
    </a>

    <a class="nav-item"
       [class.active]="activeRoute === 'manage-products'"
       routerLink="/admin/manage-products"
       (click)="closeMobileMenu()"
       [title]="isCollapsed ? 'Products' : ''">
      <div class="nav-icon">
        <ion-icon name="flower-outline"></ion-icon>
      </div>
      <span class="nav-label" *ngIf="!isCollapsed">Products</span>
      <span class="nav-count" *ngIf="!isCollapsed">{{ productCount }}</span>
    </a>

    <a class="nav-item"
       [class.active]="activeRoute === 'view-orders'"
       routerLink="/admin/view-orders"
       (click)="closeMobileMenu()"
       [title]="isCollapsed ? 'Orders' : ''">
      <div class="nav-icon">
        <ion-icon name="receipt-outline"></ion-icon>
      </div>
      <span class="nav-label" *ngIf="!isCollapsed">Orders</span>
      <span class="nav-badge" *ngIf="pendingCount > 0">{{ pendingCount }}</span>
    </a>

    <div class="nav-divider" *ngIf="!isCollapsed"><span>Shop</span></div>
    <div class="nav-divider small" *ngIf="isCollapsed"></div>

    <a class="nav-item nav-shop"
       routerLink="/home"
       (click)="closeMobileMenu()"
       [title]="isCollapsed ? 'Customer View' : ''">
      <div class="nav-icon">
        <ion-icon name="storefront-outline"></ion-icon>
      </div>
      <span class="nav-label" *ngIf="!isCollapsed">Customer View</span>
    </a>
  </nav>

  <!-- User Info at Bottom -->
  <div class="sidebar-footer">
    <div class="user-info" *ngIf="!isCollapsed">
      <div class="user-avatar">{{ adminName.charAt(0).toUpperCase() }}</div>
      <div class="user-details">
        <strong>{{ adminName }}</strong>
        <span>Administrator</span>
      </div>
    </div>
    <div class="user-avatar solo" *ngIf="isCollapsed" title="{{ adminName }}">
      {{ adminName.charAt(0).toUpperCase() }}
    </div>
    <button class="logout-btn" (click)="logout()" [title]="isCollapsed ? 'Logout' : ''">
      <ion-icon name="log-out-outline"></ion-icon>
      <span *ngIf="!isCollapsed">Logout</span>
    </button>
  </div>

</div>
