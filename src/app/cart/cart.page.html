<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-button routerLink="/home">
        <ion-icon name="arrow-back"></ion-icon>
      </ion-button>
    </ion-buttons>
    <ion-title>My Cart 🛒</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding" [scrollY]="true">

  <!-- Empty Cart -->
  <div *ngIf="cartItems.length === 0" class="empty-cart">
    <ion-icon name="cart-outline" class="empty-icon"></ion-icon>
    <h2>Your Cart is Empty!</h2>
    <p>Start shopping and add products to your cart</p>
    <ion-button routerLink="/home" color="primary" expand="block">
      <ion-icon slot="start" name="arrow-back"></ion-icon>
      Continue Shopping
    </ion-button>
  </div>

  <!-- Cart Items -->
  <div *ngIf="cartItems.length > 0" class="cart-wrapper">

    <!-- Select All -->
    <div class="select-all-row">
      <ion-checkbox [checked]="isAllSelected()" (ionChange)="toggleSelectAll($event)" class="select-all-checkbox">
        Select All
      </ion-checkbox>
    </div>

    <!-- Each Item -->
    <div class="cart-item-card" *ngFor="let item of cartItems">

      <div class="item-checkbox">
        <ion-checkbox [checked]="item.selected" (ionChange)="toggleSelect(item)"></ion-checkbox>
      </div>

      <div class="item-image">
        <img [src]="item.order.product?.img || 'assets/placeholder.png'" alt="Product image" />
      </div>

      <div class="item-details">
        <div class="item-name">{{ item.order.product?.name }}</div>
        <div class="item-price">₱{{ item.order.product?.price?.toFixed(2) }}</div>

        <div class="qty-row">
          <div class="qty-controls">
            <button class="qty-btn" (click)="decreaseQty(item)">−</button>
            <span class="qty-value">{{ item.order.quantity }}</span>
            <button class="qty-btn" (click)="increaseQty(item)">+</button>
          </div>
          <button class="remove-btn" (click)="removeFromCart(item)">Remove</button>
        </div>
      </div>

    </div>
  </div>

</ion-content>

<!-- Footer -->
<ion-footer *ngIf="cartItems.length > 0">
  <div class="footer-bar">
    <div class="footer-total">Total:<br/><strong>₱{{ getSelectedTotal().toFixed(2) }}</strong></div>
    <ion-button class="checkout-btn" color="dark" shape="round" (click)="checkout()">
      Checkout <ion-icon slot="end" name="arrow-forward-outline"></ion-icon>
    </ion-button>
  </div>
</ion-footer>
