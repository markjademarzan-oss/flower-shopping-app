<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-button routerLink="/home">
        <ion-icon name="arrow-back"></ion-icon>
      </ion-button>
    </ion-buttons>
    <ion-title>My Cart 🛒</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [scrollY]="true">

  <!-- Empty Cart -->
  <div *ngIf="cartItems.length === 0" class="empty-cart">
    <div class="empty-icon">🛒</div>
    <h2>Your Cart is Empty!</h2>
    <p>Start shopping and add products to your cart</p>
    <button class="continue-btn" routerLink="/home">← Continue Shopping</button>
  </div>

  <!-- Cart Items -->
  <div *ngIf="cartItems.length > 0" class="cart-wrapper">

    <!-- Select All -->
    <div class="select-all-row">
      <label class="custom-checkbox-label">
        <input
          type="checkbox"
          class="custom-checkbox"
          [checked]="isAllSelected()"
          (change)="toggleSelectAll($event)" />
        <span class="checkbox-box"></span>
        <span class="checkbox-text">Select All</span>
      </label>
    </div>

    <!-- Each Item -->
    <div class="cart-item-card" *ngFor="let item of cartItems">

      <div class="item-checkbox">
        <label class="custom-checkbox-label">
          <input
            type="checkbox"
            class="custom-checkbox"
            [checked]="item.selected"
            (change)="toggleSelect(item)" />
          <span class="checkbox-box"></span>
        </label>
      </div>

      <div class="item-image">
        <img [src]="item.order.product?.img || 'assets/placeholder.png'" alt="Product image" />
      </div>

      <div class="item-details">
        <div class="item-name">{{ item.order.product?.name }}</div>
        <div class="item-price">₱{{ item.order.product?.price?.toFixed(2) }}</div>

        <div class="qty-row">
          <div class="qty-controls">
            <button class="qty-btn" (click)="decreaseQty(item)">−</button>
            <span class="qty-value">{{ item.order.quantity }}</span>
            <button class="qty-btn" (click)="increaseQty(item)">+</button>
          </div>
          <button class="remove-btn" (click)="removeFromCart(item)">Remove</button>
        </div>
      </div>

    </div>
  </div>

</ion-content>

<!-- Footer -->
<div class="footer-bar" *ngIf="cartItems.length > 0">
  <div class="footer-total">
    Total:<br/>
    <strong>₱{{ getSelectedTotal().toFixed(2) }}</strong>
  </div>
  <button class="checkout-btn" (click)="checkout()">
    Checkout →
  </button>
</div>
